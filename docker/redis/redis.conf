# docker/redis/redis.conf
# Redis configuration for MangoCMS local development.
# Mounted read-only into the redis container.

# ── Network ───────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no

# ── Persistence ───────────────────────────────────────────────
# RDB snapshot — saves to /data/dump.rdb inside the container
# (mapped to the redis_data named volume)
# save if at least 1 key changed in 900 seconds
save 900 1
# save if at least 10 keys changed in 300 seconds
save 300 10
# save if at least 10000 keys changed in 60 seconds
save 60 10000

dir /data
dbfilename dump.rdb

# ── Memory ────────────────────────────────────────────────────
maxmemory 256mb
# allkeys-lru: evict least-recently-used keys when memory is full
# Good default for a cache — tenant resolution data is re-fetchable from DB
maxmemory-policy allkeys-lru

# ── Logging ───────────────────────────────────────────────────
loglevel notice

# ── Performance ───────────────────────────────────────────────
tcp-keepalive 300
timeout 0